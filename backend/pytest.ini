[pytest]
markers =
    fix_A: tests verifying Fix A (rewriter system prompt)
    fix_C: tests verifying Fix C (loosen _is_already_standalone heuristic)
    fix_D: tests verifying Fix D (fallback retrieval after gate rejection)
    side_finding: tests that exposed unrelated latent bugs
testpaths = tests
filterwarnings =
    ignore::PendingDeprecationWarning
    ignore::DeprecationWarning
